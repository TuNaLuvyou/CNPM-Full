<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quản trị Hệ thống{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .active-nav-item { background: rgba(59, 130, 246, 0.1); color: #2563eb; border-right: 4px solid #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen overflow-y-auto">
            <div class="p-6 border-b border-slate-100 flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                    <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                </div>
                <h1 class="font-bold text-lg tracking-tight text-slate-800">Admin Panel</h1>
            </div>
            <nav class="flex-1 px-3 mt-4 space-y-2">
                <a href="{% url 'admin_dashboard' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if request.resolver_match.url_name == 'admin_dashboard' %}bg-blue-600 text-white shadow-lg shadow-blue-200/50{% else %}text-slate-500 hover:bg-slate-50 hover:text-slate-700{% endif %}">
                    <div class="w-6 flex justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-tight">Dashboard</span>
                </a>
                <a href="{% url 'admin_users' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if request.resolver_match.url_name == 'admin_users' %}bg-blue-600 text-white shadow-lg shadow-blue-200/50{% else %}text-slate-500 hover:bg-slate-50 hover:text-slate-700{% endif %}">
                    <div class="w-6 flex justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-tight">Quản lý Tài khoản</span>
                </a>
                <a href="{% url 'admin_roles' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if request.resolver_match.url_name == 'admin_roles' %}bg-blue-600 text-white shadow-lg shadow-blue-200/50{% else %}text-slate-500 hover:bg-slate-50 hover:text-slate-700{% endif %}">
                    <div class="w-6 flex justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-3.618 3.04M12 2.944v10.556m0 0L8 10m4 3.5L16 10"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-tight">Phân quyền</span>
                </a>
                <a href="{% url 'admin_broadcast' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if request.resolver_match.url_name == 'admin_broadcast' %}bg-blue-600 text-white shadow-lg shadow-blue-200/50{% else %}text-slate-500 hover:bg-slate-50 hover:text-slate-700{% endif %}">
                    <div class="w-6 flex justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-tight">Gửi thông báo</span>
                </a>
                <a href="{% url 'admin_support' %}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-all {% if request.resolver_match.url_name == 'admin_support' %}bg-blue-600 text-white shadow-lg shadow-blue-200/50{% else %}text-slate-500 hover:bg-slate-50 hover:text-slate-700{% endif %}">
                    <div class="w-6 flex justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                    </div>
                    <span class="text-sm font-semibold tracking-tight">Yêu cầu hỗ trợ</span>
                </a>
            </nav>


            <div class="p-6 border-t border-slate-100">
                <form action="/api/accounts/logout/" method="POST" id="logout-form">
                    {% csrf_token %}
                    <button type="submit" class="flex items-center gap-3 px-2 py-2 w-full text-sm font-semibold text-red-500 hover:text-red-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Đăng xuất
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col">
            <!-- Navbar -->
            <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between sticky top-0 z-10">
                <div class="text-sm font-medium text-slate-500">
                    Chào mừng, <span class="text-slate-900">{{ user.username }}</span>
                </div>
                <div class="flex items-center gap-4">
                    <a href="/" class="text-sm text-blue-600 font-semibold hover:underline">Quay lại trang chủ</a>
                </div>
            </header>

            <!-- Page Content -->
            <div class="p-8">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>
</body>
</html>
